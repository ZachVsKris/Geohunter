name: Import FAOSTAT candidates

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: geostats-faostat-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out GeoStats
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-faostat.txt

      - name: Install importer dependency
        run: python -m pip install --disable-pip-version-check -r scripts/requirements-faostat.txt

      - name: Test strict importer logic
        run: python scripts/test-faostat-importer.py

      - name: Import FAOSTAT QCL into review quarantine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/import-faostat.py
